apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: owe
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/forgoes/owe-devops.git
    targetRevision: main
    path: charts/owe
  destination:
    server: https://kubernetes.default.svc
    namespace: owe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
