apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: owe-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/example/owe-devops.git
    targetRevision: main
    path: charts/owe-staging
  destination:
    server: https://kubernetes.default.svc
    namespace: owe-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
