apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: owe-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/owe-devops.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
