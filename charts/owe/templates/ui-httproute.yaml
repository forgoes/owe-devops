{{- if and .Values.gateway.enabled .Values.ui.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "owe.uiName" . }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: {{ .Values.gateway.listener.name }}
  hostnames:
    - {{ .Values.ui.route.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ui.route.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "owe.uiName" . }}
          port: {{ .Values.ui.service.port }}
{{- end }}
