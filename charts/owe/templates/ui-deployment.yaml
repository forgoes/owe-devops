apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "owe.uiName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "owe.uiName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "owe.uiName" . }}
    spec:
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "owe.uiName" . }}
          env:
{{- range $key, $value := .Values.ui.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $value.secretName }}
                  key: {{ $value.key }}
{{- if hasKey $value "optional" }}
                  optional: {{ $value.optional }}
{{- end }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.ui.resources | indent 12 }}
