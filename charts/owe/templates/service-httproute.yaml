{{- if and .Values.gateway.enabled .Values.service.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "owe.serviceName" . }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: {{ .Values.gateway.listener.name }}
  hostnames:
    - {{ .Values.service.route.host | quote }}
  rules:
    - matches:
{{- range .Values.service.route.pathPrefixes }}
        - path:
            type: PathPrefix
            value: {{ . | quote }}
{{- end }}
      backendRefs:
        - name: {{ include "owe.serviceName" . }}
          port: {{ .Values.service.service.port }}
{{- end }}
