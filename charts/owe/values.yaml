namespace: owe
namespaceConfig:
  create: true
imagePullSecrets:
  - name: ghcr-creds
gateway:
  enabled: true
  name: owe-gateway
  gatewayClassName: envoy-gateway
  gatewayClass:
    create: true
    controllerName: gateway.envoyproxy.io/gatewayclass-controller
  listener:
    name: http
    port: 80
    protocol: HTTP
    hostname: owe.hongkang.name

ui:
  replicaCount: 3
  image:
    repository: ghcr.io/forgoes/owe-ui
    tag: v0.0.1.dev9
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NEXT_PUBLIC_API_BASE_URL: https://owe.hongkang.name
  route:
    enabled: true
    host: owe.hongkang.name
    pathPrefix: /
  resources: {}

service:
  replicaCount: 3
  image:
    repository: ghcr.io/forgoes/owe-service
    tag: v0.0.1.dev8
    pullPolicy: IfNotPresent
  migration:
    enabled: true
  service:
    port: 8000
  env:
    APP_ENV: staging
    LOG_LEVEL: INFO
    OPENAI_MODEL: gpt-5.4
    MODEL_STARTUP_PROBE: "true"
    DB_HOST: postgres-rw.postgres.svc.cluster.local
    DB_PORT: "5432"
    DB_NAME: app
    DB_SCHEMA: owe
    DB_ECHO: "false"
    LANGSMITH_TRACING: "false"
    LANGSMITH_PROJECT: owe-service
    LANGSMITH_ENDPOINT: https://api.smith.langchain.com
  secretEnv:
    OPENAI_API_KEY:
      secretName: owe-service-secrets
      key: OPENAI_API_KEY
    DB_USER:
      secretName: owe-service-secrets
      key: DB_USER
    DB_PASSWORD:
      secretName: owe-service-secrets
      key: DB_PASSWORD
    LANGSMITH_API_KEY:
      secretName: owe-service-secrets
      key: LANGSMITH_API_KEY
      optional: true
  route:
    enabled: true
    host: owe.hongkang.name
    pathPrefixes:
      - /api/v1
      - /healthz
  resources: {}
