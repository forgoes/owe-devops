apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "owe-staging.uiName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "owe-staging.uiName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "owe-staging.uiName" . }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "owe-staging.uiName" . }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.ui.resources | indent 12 }}

