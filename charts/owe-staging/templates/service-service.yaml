apiVersion: v1
kind: Service
metadata:
  name: {{ include "owe-staging.serviceName" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "owe-staging.serviceName" . }}
  ports:
    - name: http
      port: {{ .Values.service.service.port }}
      targetPort: http

